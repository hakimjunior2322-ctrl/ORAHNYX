  services:
  db:
    image: postgres:15-alpine
    container_name: salon-premium-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: salon_user
      POSTGRES_PASSWORD: salon_password
      POSTGRES_DB: salon_premium
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: ./backend
    container_name: salon-premium-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://salon_user:salon_password@db:5432/salon_premium
      JWT_SECRET: votre_secret_super_securise_changez_moi_123456789
      REDIS_URL: redis://cache:6379
    depends_on:
      - db
      - cache
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: salon-premium-web
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    container_name: salon-premium-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: salon-network

