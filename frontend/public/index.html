<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            width: 100%;
            box-sizing: border-box;
        }

        .header-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .header-left {
            font-size: 7px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            line-height: 1.2;
            opacity: 0.7;
            flex: 0 0 auto;
            min-width: 40px;
        }

        .logo {
            position: relative;
            flex: 1;
            text-align: center;
            font-family: 'Bodoni Moda', serif;
            font-size: 9px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 7px;
            font-weight: 500;
            letter-spacing: 0.3px;
            flex: 0 0 auto;
            justify-content: flex-end;
        }

        .header-right a {
            color: #1a1a1a;
            text-decoration: none;
            transition: opacity 0.3s;
            white-space: nowrap;
            opacity: 0.7;
            font-size: 8px;
        }

        .header-right a:hover {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .header-right a {
                display: none;
            }

            .logo {
                font-size: 8px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 10px 12px;
            }

            .header-wrapper {
                padding: 0 5px;
                gap: 10px;
            }

            .header-left {
                font-size: 6px;
                min-width: 35px;
            }

            .logo {
                font-size: 7px;
                letter-spacing: 0.5px;
            }

            .header-right {
                gap: 10px;
                font-size: 6px;
            }

            .header-right a {
                display: none;
            }
        }

        .cart-icon {
            cursor: pointer;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .cart-icon:hover {
            opacity: 1;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #8b7355;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
        }

        /* MAIN */
        main {
            position: relative;
            z-index: 2;
            margin-top: 50px;
        }

        /* HERO */
        .hero {
            min-height: 55vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: transparent;
            margin: 40px 0;
        }

        .hero-frame {
            background: transparent;
            border: none;
            padding: 20px 0;
            width: 100%;
            box-shadow: none;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .hero-left {
            flex: 1;
            min-width: 0;
        }

        .hero-title {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(24px, 7vw, 36px);
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: -0.3px;
            margin-bottom: 10px;
            text-align: left;
            color: #1a1a1a;
        }

        .hero-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.6;
            letter-spacing: 0.2px;
            text-align: left;
        }

        .hero-emoji {
            font-size: clamp(45px, 8vw, 60px);
            opacity: 0.7;
        }

        .cta-button {
            padding: 12px 36px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            transition: all 0.3s;
            display: inline-block;
            margin-top: 12px;
        }

        .cta-button:hover {
            background: #333;
            transform: translateY(-1px);
        }

        /* SECTION */
        .section {
            margin: 80px 10px;
            padding: 0 20px;
        }

        .section-title {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 400;
            text-align: center;
            margin-bottom: 45px;
            letter-spacing: -0.2px;
            opacity: 0.95;
        }

        /* SHOP */
        .shop-section {
            background: linear-gradient(to bottom, #fdfbf7 0%, #f9f5f0 100%);
            padding: 60px 20px;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        .shop-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        .shop-title {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 400;
            text-align: center;
            color: #2a2a2a;
            margin-bottom: 30px;
            letter-spacing: -0.3px;
        }

        .shop-categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 16px;
            border: 1px solid #d4a574;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            transition: all 0.3s;
            color: #8b7355;
        }

        .category-btn:hover,
        .category-btn.active {
            background: #8b7355;
            color: white;
            border-color: #8b7355;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .shop-card {
            background: #ffffff;
            border: 1px solid #e8dfd0;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.320, 1);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.08);
        }

        .shop-card:hover {
            border-color: #d4a574;
            box-shadow: 0 12px 30px rgba(139, 115, 85, 0.15);
            transform: translateY(-6px);
        }

        .shop-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #e8dfd0 0%, #d4c5b5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: rgba(139, 115, 85, 0.3);
        }

        .shop-content {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .shop-name {
            font-family: 'Bodoni Moda', serif;
            font-size: 14px;
            font-weight: 400;
            color: #2a2a2a;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }

        .shop-desc {
            font-size: 10px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px;
            flex: 1;
        }

        .shop-price {
            font-family: 'Bodoni Moda', serif;
            font-size: 18px;
            font-weight: 400;
            color: #8b7355;
            margin-bottom: 10px;
        }

        .shop-btn {
            width: 100%;
            padding: 10px 16px;
            background: #8b7355;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            transition: all 0.3s;
        }

        .shop-btn:hover {
            background: #6b5745;
            transform: translateY(-2px);
        }

        /* PRICING */
        .pricing-section {
            max-width: 1100px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .pricing-card {
            background: #ffffff;
            border: 1px solid #f0f0f0;
            padding: 35px 28px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            border-radius: 8px;
        }

        .pricing-card:hover {
            border-color: #ddd;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .pricing-card.featured {
            border: 1.5px solid #1a1a1a;
            background: #f9f9f9;
        }

        .pricing-name {
            font-family: 'Bodoni Moda', serif;
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }

        .pricing-price {
            font-family: 'Bodoni Moda', serif;
            font-size: 26px;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 2px;
        }

        .pricing-period {
            font-size: 8px;
            color: #aaa;
            margin-bottom: 18px;
        }

        .pricing-button {
            width: 100%;
            padding: 10px 16px;
            background: #1a1a1a;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            border-radius: 2px;
            margin-top: 20px;
        }

        .pricing-button:hover {
            background: #333;
        }

        /* FOOTER */
        .footer {
            background: #1a1a1a;
            color: #999;
            padding: 45px 20px;
            margin-top: 80px;
            text-align: center;
            font-size: 9px;
        }

        .footer p {
            margin: 5px 0;
        }

        /* MODAL PANIER */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: flex-end;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            margin: auto;
            border-radius: 12px 12px 0 0;
            padding: 30px 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .modal-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 12px;
        }

        .cart-item-price {
            font-weight: 700;
            color: #8b7355;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }

        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .cart-summary {
            padding: 20px 0;
            border-top: 2px solid #1a1a1a;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .summary-row.total {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
            margin-top: 10px;
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: #8b7355;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 10px;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .checkout-btn:hover {
            background: #6b5745;
        }

        @media (max-width: 768px) {
            .pricing-grid {
                grid-template-columns: 1fr;
            }

            .shop-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .hero-frame {
                flex-direction: column;
            }

            .shop-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-wrapper">
            <div class="header-left">SALON<br>© 24</div>
            <div class="logo">PREMIUM</div>
            <div class="header-right">
                <a href="#shop">Boutique</a>
                <a href="#pricing">Tarifs</a>
                <a href="reservation.html">Réserver</a>
                <div style="position: relative; cursor: pointer;" onclick="toggleCart()">
                    <span class="cart-icon">🛍️</span>
                    <div class="cart-count" id="cartCount" style="display: none;">0</div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- HERO -->
        <section class="hero">
            <div class="hero-frame">
                <div class="hero-left">
                    <h1 class="hero-title">Salon Premium</h1>
                    <p class="hero-desc">Soins beauté pour les ongles, cheveux, visage & corps</p>
                </div>
                <div style="flex: 0 0 auto;">
                    <div class="hero-emoji">✨</div>
                </div>
                <div style="flex: 0 0 auto;">
                    <button class="cta-button" onclick="window.location.href='reservation.html'">RÉSERVER</button>
                </div>
            </div>
        </section>

        <!-- SHOP/BOUTIQUE -->
        <section class="shop-section" id="shop">
            <div class="shop-container">
                <h2 class="shop-title">Notre Boutique</h2>

                <div class="shop-categories">
                    <button class="category-btn active" onclick="filterCategory('all', this)">Tous les produits</button>
                    <button class="category-btn" onclick="filterCategory('serums', this)">Sérums & Crèmes</button>
                    <button class="category-btn" onclick="filterCategory('cheveux', this)">Cheveux</button>
                    <button class="category-btn" onclick="filterCategory('ongles', this)">Ongles</button>
                    <button class="category-btn" onclick="filterCategory('kits', this)">Kits</button>
                </div>

                <div class="shop-grid" id="shopGrid"></div>
            </div>
        </section>

        <!-- PRICING -->
        <section class="pricing-section" id="pricing">
            <h2 class="section-title">Nos Tarifs</h2>
            <div class="pricing-grid" id="pricingGrid"></div>
        </section>
    </main>

    <!-- MODAL PANIER -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <button class="modal-close" onclick="toggleCart()">✕</button>
            <h2 class="modal-title">Mon Panier</h2>
            
            <div id="cartItems"></div>

            <div class="cart-summary" id="cartSummary" style="display: none;">
                <div class="summary-row">
                    <span>Total:</span>
                    <span id="totalPrice">0€</span>
                </div>
            </div>

            <button class="checkout-btn" onclick="goToReservation()">Passer à la réservation</button>
        </div>
    </div>

    <footer class="footer">
        <p>Salon Premium • Dubaï • +971 4 123 456 789</p>
        <p>contact@salon.ae</p>
    </footer>

    <script>
        const API_URL = 'http://localhost:8000';
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let allProducts = [];
        let allPacks = [];

        // Charger les données depuis l'API
        async function loadData() {
            try {
                // Charger les produits
                const productsRes = await fetch(`${API_URL}/api/products`);
                const productsData = await productsRes.json();
                allProducts = productsData.products || [];

                // Charger les packs
                const packsRes = await fetch(`${API_URL}/api/packs`);
                const packsData = await packsRes.json();
                allPacks = packsData.packs || [];

                renderProducts();
                renderPacks();
                updateCart();
            } catch (error) {
                console.error('Erreur chargement données:', error);
                alert('Erreur de connexion au serveur');
            }
        }

        function renderProducts() {
            const grid = document.getElementById('shopGrid');
            grid.innerHTML = allProducts.map(product => `
                <div class="shop-card" data-category="${product.category}">
                    <div class="shop-image">💄</div>
                    <div class="shop-content">
                        <h3 class="shop-name">${product.name}</h3>
                        <p class="shop-desc">${product.description || 'Produit premium'}</p>
                        <div class="shop-price">${product.price}€</div>
                        <button class="shop-btn" onclick="addToCart('${product.name}', ${product.price}, 'product')">AJOUTER</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPacks() {
            const grid = document.getElementById('pricingGrid');
            grid.innerHTML = allPacks.map((pack, idx) => `
                <div class="pricing-card ${idx === 1 ? 'featured' : ''}">
                    <h3 class="pricing-name">${pack.name}</h3>
                    <div class="pricing-price">${pack.price}€</div>
                    <p class="pricing-period">${pack.duration_minutes || pack.duration} minutes</p>
                    <button class="pricing-button" onclick="addToCart('${pack.name}', ${pack.price}, 'pack')">AJOUTER</button>
                </div>
            `).join('');
        }

        function filterCategory(category, btn) {
            const cards = document.querySelectorAll('.shop-card');
            cards.forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function addToCart(name, price, type) {
            cart.push({ name, price, id: Date.now(), type });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
            
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #8b7355;
                color: white;
                padding: 16px 24px;
                border-radius: 8px;
                box-shadow: 0 4px 16px rgba(139, 115, 85, 0.3);
                z-index: 1000;
                font-size: 12px;
                font-weight: 600;
            `;
            notification.textContent = `✓ ${name} ajouté au panier`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function updateCart() {
            const cartCount = document.getElementById('cartCount');
            const cartItems = document.getElementById('cartItems');
            const cartSummary = document.getElementById('cartSummary');

            if (cart.length > 0) {
                cartCount.textContent = cart.length;
                cartCount.style.display = 'flex';
            } else {
                cartCount.style.display = 'none';
            }

            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="cart-empty">Votre panier est vide</div>';
                cartSummary.style.display = 'none';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-name">${item.name}</div>
                            <div style="font-size: 10px; color: #999;">${item.type === 'pack' ? 'Prestation' : 'Produit'}</div>
                        </div>
                        <div>
                            <span class="cart-item-price">${item.price}€</span>
                            <button class="cart-item-remove" onclick="removeFromCart(${item.id})">✕</button>
                        </div>
                    </div>
                `).join('');

                const total = cart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('totalPrice').textContent = total.toFixed(2) + '€';
                cartSummary.style.display = 'block';
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('active');
        }

        function goToReservation() {
            toggleCart();
            window.location.href = 'reservation.html';
        }

        // Charger les données au démarrage
        loadData();
    </script>
</body>
</html>
