<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Salon Premium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: Arial, sans-serif; 
      background: #f5f5f5; 
    }
    
    header { 
      background: #333; 
      color: white; 
      padding: 15px; 
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { margin: 0; }
    
    .logout { 
      background: #dc3545; 
      color: white; 
      border: none; 
      padding: 10px 20px; 
      cursor: pointer;
      border-radius: 3px;
    }
    
    .logout:hover { background: #c82333; }

    .container { 
      max-width: 1200px; 
      margin: 20px auto; 
      padding: 20px; 
    }

    .menu { 
      background: white; 
      padding: 15px; 
      border-radius: 5px; 
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .menu button { 
      padding: 10px 20px; 
      margin: 5px; 
      background: #007bff; 
      color: white; 
      border: none; 
      cursor: pointer; 
      border-radius: 3px;
      white-space: nowrap;
    }

    .menu button:hover { background: #0056b3; }
    .menu button.active { background: #28a745; }

    .section { 
      background: white; 
      padding: 20px; 
      border-radius: 5px; 
      margin-bottom: 20px; 
      display: none; 
    }

    .section.active { display: block; }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
      gap: 20px; 
      margin-top: 20px; 
    }

    .card { 
      background: #f9f9f9; 
      border: 1px solid #ddd; 
      padding: 15px; 
      border-radius: 5px; 
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 3px;
      margin-bottom: 10px;
    }

    .card h3 { margin-bottom: 10px; }
    .card p { color: #666; font-size: 14px; }

    .price { 
      font-weight: bold; 
      color: #28a745; 
      font-size: 18px; 
      margin: 10px 0; 
    }

    .loading { 
      text-align: center; 
      color: #999; 
      padding: 40px;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .btn-group {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      flex: 1;
    }

    .btn-edit {
      background: #17a2b8;
      color: white;
    }

    .btn-delete {
      background: #dc3545;
      color: white;
    }

    .btn-add {
      background: #28a745;
      color: white;
      padding: 10px 20px;
      margin-bottom: 15px;
    }

    .btn:hover { opacity: 0.8; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.4);
      overflow: auto;
    }

    .modal.show { display: block; }

    .modal-content {
      background-color: #fefefe;
      margin: 5% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 90%;
      max-width: 500px;
      border-radius: 5px;
    }

    .modal-close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .modal-close:hover { color: #000; }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-family: Arial, sans-serif;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group button {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    .form-group button:hover { background: #0056b3; }

    .alert {
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 3px;
      display: none;
    }

    .alert.show { display: block; }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    /* Horaires */
    .horaires-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .horaire-card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }

    .horaire-card h4 {
      margin-bottom: 10px;
    }

    .horaire-card input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
    }

    /* Calendar */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .calendar-day {
      padding: 15px;
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 3px;
      cursor: pointer;
      background: white;
    }

    .calendar-day:hover {
      background: #e9ecef;
    }

    .calendar-day.unavailable {
      background: #dc3545;
      color: white;
    }

    .calendar-day.today {
      border: 2px solid #007bff;
    }

    /* Réservations Table */
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .table th,
    .table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    .table th {
      background: #f8f9fa;
      font-weight: bold;
    }

    .table tr:hover {
      background: #f5f5f5;
    }

    .status-badge {
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-confirmed {
      background: #d4edda;
      color: #155724;
    }

    @media (max-width: 768px) {
      .menu {
        overflow-x: auto;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .horaires-grid {
        grid-template-columns: 1fr;
      }

      .calendar-grid {
        grid-template-columns: repeat(7, 1fr);
      }

      .modal-content {
        width: 95%;
        margin: 50% auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Admin Dashboard - Salon Premium</h1>
    <button class="logout" onclick="logout()">Déconnexion</button>
  </header>

  <div class="container">
    <div id="alert" class="alert"></div>

    <div class="menu">
      <button onclick="showSection('produits')" class="menu-btn active">Produits</button>
      <button onclick="showSection('prestations')" class="menu-btn">Prestations</button>
      <button onclick="showSection('galerie')" class="menu-btn">Galerie</button>
      <button onclick="showSection('reservations')" class="menu-btn">Réservations</button>
      <button onclick="showSection('horaires')" class="menu-btn">Horaires</button>
      <button onclick="showSection('kilometrage')" class="menu-btn">Kilométrage</button>
      <button onclick="showSection('calendrier')" class="menu-btn">Calendrier</button>
      <button onclick="showSection('config')" class="menu-btn">Configuration</button>
    </div>

    <!-- PRODUITS -->
    <div id="produits" class="section active">
      <h2>Produits</h2>
      <button class="btn-add" onclick="openProduitModal()">+ Ajouter un Produit</button>
      <div id="produitsGrid" class="grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- PRESTATIONS -->
    <div id="prestations" class="section">
      <h2>Prestations</h2>
      <button class="btn-add" onclick="openPrestationModal()">+ Ajouter une Prestation</button>
      <div id="prestationsGrid" class="grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- GALERIE -->
    <div id="galerie" class="section">
      <h2>Galerie</h2>
      <button class="btn-add" onclick="openGalerieModal()">+ Ajouter une Photo</button>
      <div id="galerieGrid" class="grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- RESERVATIONS -->
    <div id="reservations" class="section">
      <h2>Réservations Clients</h2>
      <table class="table">
        <thead>
          <tr>
            <th>Client</th>
            <th>Email</th>
            <th>Date</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="reservationsTable">
          <tr><td colspan="5" class="loading"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- HORAIRES -->
    <div id="horaires" class="section">
      <h2>Horaires d'Ouverture</h2>
      <form id="horairesForm">
        <div class="horaires-grid" id="horairesGrid"></div>
        <button type="submit" class="btn-add" style="margin-top: 20px;">Sauvegarder</button>
      </form>
    </div>

    <!-- KILOMETRAGE -->
    <div id="kilometrage" class="section">
      <h2>Configuration Kilométrage</h2>
      <form id="kilometrageForm">
        <div class="form-group">
          <label>Prix par kilomètre (€)</label>
          <input type="number" id="pricePerKm" step="0.01" min="0" placeholder="4.00">
        </div>
        <button type="submit" class="btn-add">Sauvegarder</button>
      </form>
      <div id="kmMessage" class="alert"></div>
    </div>

    <!-- CALENDRIER -->
    <div id="calendrier" class="section">
      <h2>Calendrier de Disponibilité</h2>
      <div style="margin-bottom: 20px;">
        <button onclick="changeMonth(-1)" class="btn-add" style="width: auto;">← Mois Précédent</button>
        <span id="currentMonth" style="margin: 0 20px; font-weight: bold;"></span>
        <button onclick="changeMonth(1)" class="btn-add" style="width: auto;">Mois Suivant →</button>
      </div>
      <div id="calendar" class="calendar-grid"></div>
      <h3 style="margin-top: 30px;">Dates indisponibles</h3>
      <div id="unavailableList" style="margin-top: 15px;"></div>
    </div>

    <!-- CONFIG -->
    <div id="config" class="section">
      <h2>Configuration du Salon</h2>
      <form id="configForm">
        <div class="form-group">
          <label>Nom du salon</label>
          <input type="text" id="salonName" placeholder="Salon Premium">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="salonEmail" placeholder="contact@salon.com">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" id="salonPhone">
        </div>
        <div class="form-group">
          <label>Adresse</label>
          <input type="text" id="salonAddress">
        </div>
        <button type="submit" class="btn-add">Sauvegarder</button>
      </form>
    </div>
  </div>

  <!-- MODAL PRODUIT -->
  <div id="produitModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal('produitModal')">&times;</span>
      <h2>Produit</h2>
      <form id="produitForm">
        <input type="hidden" id="produitId">
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" id="produitName" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="produitDesc"></textarea>
        </div>
        <div class="form-group">
          <label>Prix (€) *</label>
          <input type="number" id="produitPrice" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" id="produitStock" value="0">
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="produitImage">
        </div>
        <div class="form-group">
          <button type="submit">Sauvegarder</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL PRESTATION -->
  <div id="prestationModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal('prestationModal')">&times;</span>
      <h2>Prestation</h2>
      <form id="prestationForm">
        <input type="hidden" id="prestationId">
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" id="prestationName" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="prestationDesc"></textarea>
        </div>
        <div class="form-group">
          <label>Prix (€) *</label>
          <input type="number" id="prestationPrice" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Durée (min) *</label>
          <input type="number" id="prestationDuration" required>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="prestationImage">
        </div>
        <div class="form-group">
          <button type="submit">Sauvegarder</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL GALERIE -->
  <div id="galerieModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal('galerieModal')">&times;</span>
      <h2>Ajouter une Photo</h2>
      <form id="galerieForm">
        <div class="form-group">
          <label>URL de l'image *</label>
          <input type="text" id="galerieImage" required>
        </div>
        <div class="form-group">
          <button type="submit">Ajouter</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    const token = localStorage.getItem('token');
    let currentDate = new Date();
    let unavailableDates = [];

    if (!token) {
      window.location.href = '/admin/login.html';
    }

    // ==================== UTILITIES ====================
    function showAlert(msg, type = 'success') {
      const alert = document.getElementById('alert');
      alert.textContent = msg;
      alert.className = `alert show alert-${type}`;
      setTimeout(() => alert.classList.remove('show'), 3000);
    }

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');

      document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      if (id === 'produits') loadProduits();
      if (id === 'prestations') loadPrestations();
      if (id === 'galerie') loadGalerie();
      if (id === 'reservations') loadReservations();
      if (id === 'horaires') loadHoraires();
      if (id === 'kilometrage') loadKilometrage();
      if (id === 'calendrier') loadCalendrier();
      if (id === 'config') loadConfig();
    }

    function openModal(id) {
      document.getElementById(id).classList.add('show');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = '/admin/login.html';
    }

    async function apiCall(endpoint, method = 'GET', data = null) {
      try {
        const options = {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        };
        if (data) options.body = JSON.stringify(data);

        const res = await fetch(`${API_URL}${endpoint}`, options);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (error) {
        showAlert(`Erreur: ${error.message}`, 'error');
        return null;
      }
    }

    // ==================== PRODUITS ====================
    async function loadProduits() {
      const data = await apiCall('/produits');
      const grid = document.getElementById('produitsGrid');
      if (!data || !data.length) {
        grid.innerHTML = '<div class="loading">Aucun produit</div>';
        return;
      }
      grid.innerHTML = data.map(p => `
        <div class="card">
          ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : ''}
          <h3>${p.name}</h3>
          <p>${p.description || ''}</p>
          <div class="price">${p.price}€</div>
          <small>Stock: ${p.stock}</small>
          <div class="btn-group">
            <button class="btn btn-edit" onclick='editProduit(${JSON.stringify(p)})'>Modifier</button>
            <button class="btn btn-delete" onclick="deleteProduit(${p.id})">Supprimer</button>
          </div>
        </div>
      `).join('');
    }

    function openProduitModal() {
      document.getElementById('produitId').value = '';
      document.getElementById('produitForm').reset();
      openModal('produitModal');
    }

    function editProduit(p) {
      document.getElementById('produitId').value = p.id;
      document.getElementById('produitName').value = p.name;
      document.getElementById('produitDesc').value = p.description || '';
      document.getElementById('produitPrice').value = p.price;
      document.getElementById('produitStock').value = p.stock;
      document.getElementById('produitImage').value = p.image_url || '';
      openModal('produitModal');
    }

    async function deleteProduit(id) {
      if (!confirm('Supprimer ce produit ?')) return;
      await apiCall(`/produits/${id}`, 'DELETE');
      showAlert('Produit supprimé');
      loadProduits();
    }

    document.getElementById('produitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('produitId').value;
      const data = {
        name: document.getElementById('produitName').value,
        description: document.getElementById('produitDesc').value,
        price: parseFloat(document.getElementById('produitPrice').value),
        stock: parseInt(document.getElementById('produitStock').value),
        image_url: document.getElementById('produitImage').value
      };
      if (id) {
        await apiCall(`/produits/${id}`, 'PUT', data);
        showAlert('Produit mis à jour');
      } else {
        await apiCall('/produits', 'POST', data);
        showAlert('Produit créé');
      }
      closeModal('produitModal');
      loadProduits();
    });

    // ==================== PRESTATIONS ====================
    async function loadPrestations() {
      const data = await apiCall('/prestations');
      const grid = document.getElementById('prestationsGrid');
      if (!data || !data.length) {
        grid.innerHTML = '<div class="loading">Aucune prestation</div>';
        return;
      }
      grid.innerHTML = data.map(p => `
        <div class="card">
          ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : ''}
          <h3>${p.name}</h3>
          <p>${p.description || ''}</p>
          <div class="price">${p.price}€</div>
          <small>Durée: ${p.duration_minutes} min</small>
          <div class="btn-group">
            <button class="btn btn-edit" onclick='editPrestation(${JSON.stringify(p)})'>Modifier</button>
            <button class="btn btn-delete" onclick="deletePrestation(${p.id})">Supprimer</button>
          </div>
        </div>
      `).join('');
    }

    function openPrestationModal() {
      document.getElementById('prestationId').value = '';
      document.getElementById('prestationForm').reset();
      openModal('prestationModal');
    }

    function editPrestation(p) {
      document.getElementById('prestationId').value = p.id;
      document.getElementById('prestationName').value = p.name;
      document.getElementById('prestationDesc').value = p.description || '';
      document.getElementById('prestationPrice').value = p.price;
      document.getElementById('prestationDuration').value = p.duration_minutes;
      document.getElementById('prestationImage').value = p.image_url || '';
      openModal('prestationModal');
    }

    async function deletePrestation(id) {
      if (!confirm('Supprimer cette prestation ?')) return;
      await apiCall(`/prestations/${id}`, 'DELETE');
      showAlert('Prestation supprimée');
      loadPrestations();
    }

    document.getElementById('prestationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('prestationId').value;
      const data = {
        name: document.getElementById('prestationName').value,
        description: document.getElementById('prestationDesc').value,
        price: parseFloat(document.getElementById('prestationPrice').value),
        duration_minutes: parseInt(document.getElementById('prestationDuration').value),
        image_url: document.getElementById('prestationImage').value
      };
      if (id) {
        await apiCall(`/prestations/${id}`, 'PUT', data);
        showAlert('Prestation mise à jour');
      } else {
        await apiCall('/prestations', 'POST', data);
        showAlert('Prestation créée');
      }
      closeModal('prestationModal');
      loadPrestations();
    });

    // ==================== GALERIE ====================
    async function loadGalerie() {
      const data = await apiCall('/galerie');
      const grid = document.getElementById('galerieGrid');
      if (!data || !data.length) {
        grid.innerHTML = '<div class="loading">Aucune image</div>';
        return;
      }
      grid.innerHTML = data.map(img => `
        <div class="card" style="padding: 0; overflow: hidden; position: relative;">
          <img src="${img.image_url}" alt="Galerie" style="height: 250px;">
          <button class="btn btn-delete" onclick="deleteGalerie(${img.id})" style="position: absolute; top: 5px; right: 5px; width: auto; padding: 5px 10px;">Supprimer</button>
        </div>
      `).join('');
    }

    function openGalerieModal() {
      document.getElementById('galerieForm').reset();
      openModal('galerieModal');
    }

    async function deleteGalerie(id) {
      if (!confirm('Supprimer cette image ?')) return;
      await apiCall(`/galerie/${id}`, 'DELETE');
      showAlert('Image supprimée');
      loadGalerie();
    }

    document.getElementById('galerieForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = document.getElementById('galerieImage').value;
      if (!url) return showAlert('URL requise', 'error');
      await apiCall('/galerie', 'POST', { image_url: url, alt_text: 'Photo galerie' });
      showAlert('Photo ajoutée');
      closeModal('galerieModal');
      loadGalerie();
    });

    // ==================== RESERVATIONS ====================
    async function loadReservations() {
      const data = await apiCall('/reservations');
      const tbody = document.getElementById('reservationsTable');
      if (!data || !data.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="loading">Aucune réservation</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${r.client_name}</td>
          <td>${r.client_email}</td>
          <td>${new Date(r.reservation_date).toLocaleDateString('fr-FR')}</td>
          <td><span class="status-badge status-${r.status}">${r.status}</span></td>
          <td><button class="btn btn-delete" onclick="deleteReservation(${r.id})">Supprimer</button></td>
        </tr>
      `).join('');
    }

    async function deleteReservation(id) {
      if (!confirm('Supprimer cette réservation ?')) return;
      await apiCall(`/reservations/${id}`, 'DELETE');
      showAlert('Réservation supprimée');
      loadReservations();
    }

    // ==================== HORAIRES ====================
    async function loadHoraires() {
      const jours = ['lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
      const defaultHoraires = {
        lundi: '9h00 - 18h00',
        mardi: '9h00 - 18h00',
        mercredi: '9h00 - 18h00',
        jeudi: '9h00 - 18h00',
        vendredi: '9h00 - 18h00',
        samedi: '10h00 - 16h00'
      };
      
      let html = '';
      jours.forEach(jour => {
        html += `
          <div class="horaire-card">
            <h4>${jour.charAt(0).toUpperCase() + jour.slice(1)}</h4>
            <input type="text" name="${jour}" value="${defaultHoraires[jour]}">
          </div>
        `;
      });
      document.getElementById('horairesGrid').innerHTML = html;
    }

    document.getElementById('horairesForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      showAlert('Horaires sauvegardés');
    });

    // ==================== KILOMETRAGE ====================
    async function loadKilometrage() {
      const data = await apiCall('/pricing-config');
      if (data) {
        document.getElementById('pricePerKm').value = data.price_per_km || 4.00;
      }
    }

    document.getElementById('kilometrageForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const price_per_km = parseFloat(document.getElementById('pricePerKm').value);
      await apiCall('/pricing-config', 'PUT', { price_per_km });
      showAlert('Prix kilométrage sauvegardé');
    });

    // ==================== CALENDRIER ====================
    async function loadCalendrier() {
      const data = await apiCall('/unavailable-dates');
      unavailableDates = data || [];
      renderCalendar();
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      document.getElementById('currentMonth').textContent = 
        currentDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

      let html = '';
      const dayNames = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
      dayNames.forEach(d => html += `<div style="font-weight: bold; text-align: center;">${d}</div>`);

      for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) html += '<div></div>';

      const today = new Date();
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const dateStr = date.toISOString().split('T')[0];
        const isUnavailable = unavailableDates.some(d => d.date.split('T')[0] === dateStr);
        const isToday = date.toDateString() === today.toDateString();

        html += `
          <div class="calendar-day ${isUnavailable ? 'unavailable' : ''} ${isToday ? 'today' : ''}" 
               onclick="toggleDate('${dateStr}')">${day}</div>
        `;
      }

      document.getElementById('calendar').innerHTML = html;

      // Render unavailable list
      const list = document.getElementById('unavailableList');
      if (!unavailableDates.length) {
        list.innerHTML = '<p style="color: #999;">Aucune date indisponible</p>';
      } else {
        list.innerHTML = unavailableDates.map(d => `
          <div style="background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 3px; display: flex; justify-content: space-between; align-items: center;">
            <span>${new Date(d.date).toLocaleDateString('fr-FR')}</span>
            <button class="btn btn-delete" onclick="toggleDate('${d.date.split('T')[0]}')" style="width: auto;">Supprimer</button>
          </div>
        `).join('');
      }
    }

    async function toggleDate(dateStr) {
      const existing = unavailableDates.find(d => d.date.split('T')[0] === dateStr);
      if (existing) {
        await apiCall(`/unavailable-dates/${existing.id}`, 'DELETE');
      } else {
        await apiCall('/unavailable-dates', 'POST', { date: dateStr, reason: 'Fermé' });
      }
      loadCalendrier();
    }

    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
    }

    // ==================== CONFIG ====================
    async function loadConfig() {
      const data = await apiCall('/config');
      if (data) {
        document.getElementById('salonName').value = data.salon_name || '';
        document.getElementById('salonEmail').value = data.salon_email || '';
        document.getElementById('salonPhone').value = data.salon_phone || '';
        document.getElementById('salonAddress').value = data.salon_address || '';
      }
    }

    document.getElementById('configForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        salon_name: document.getElementById('salonName').value,
        salon_email: document.getElementById('salonEmail').value,
        salon_phone: document.getElementById('salonPhone').value,
        salon_address: document.getElementById('salonAddress').value
      };
      await apiCall('/config', 'PUT', data);
      showAlert('Configuration sauvegardée');
    });

    // Init
    loadProduits();
  </script>
</body>
</html>
