<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard DEBUG</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .debug { background: #ffe; border: 2px solid orange; padding: 10px; margin: 10px 0; }
        .btn { padding: 10px 20px; background: #8b7355; color: white; border: none; margin: 5px; }
    </style>
</head>
<body>
    <h1>DASHBOARD DEBUG</h1>
    <div id="debug" class="debug">Initialisation...</div>
    
    <button class="btn" onclick="testToken()">1. Tester Token</button>
    <button class="btn" onclick="testAPI()">2. Tester API</button>
    <button class="btn" onclick="loadProduitsDebug()">3. Charger Produits</button>
    
    <div id="result"></div>

    <script>
        function log(msg) {
            document.getElementById('debug').innerHTML += '<br>' + msg;
        }
        
        function getToken() {
            return localStorage.getItem('token');
        }

        function testToken() {
            const token = getToken();
            if (token) {
                log('Token OK: ' + token.substring(0, 20) + '...');
            } else {
                log('PAS DE TOKEN!');
            }
        }

        async function testAPI() {
            log('Test API...');
            try {
                const response = await fetch('/api/produits', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                log('Status: ' + response.status);
                const data = await response.json();
                log('Produits: ' + data.length);
            } catch (e) {
                log('ERREUR: ' + e.message);
            }
        }

        async function loadProduitsDebug() {
            log('Chargement...');
            const result = document.getElementById('result');
            result.innerHTML = 'Chargement...';
            
            try {
                const response = await fetch('/api/produits', {
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    }
                });
                
                const produits = await response.json();
                
                result.innerHTML = produits.map(p => `
                    <div style="border: 1px solid #ddd; padding: 10px; margin: 10px;">
                        <h3>${p.name}</h3>
                        <p>${p.price}€</p>
                    </div>
                `).join('');
                
                log('Affichage OK!');
            } catch (e) {
                log('ERREUR: ' + e.message);
                result.innerHTML = 'ERREUR: ' + e.message;
            }
        }
        
        log('Page chargée!');
        testToken();
    </script>
</body>
</html>
