version: '3.9'

services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: salon_password

  backend:
    environment:
      NODE_ENV: development
      DEBUG: true
    command: npm run dev
    ports:
      - "8000:8000"

  frontend:
    environment:
      NODE_ENV: development
    command: npm run dev
    ports:
      - "3000:3000"

  nginx:
    profiles:
      - prod
